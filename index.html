<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Monitoring Metering V2 - TVRI</title>
  <link rel="icon" href="logo.png" type ="image/png"/>
  <style>
    /* --- STYLES --- */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d3b66; margin: 0; padding: 0; color: #000; }
    .container { background: #fff; border-radius: 20px; padding: 20px; max-width: 850px; margin: 40px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    h1 { text-align: center; color: #0d3b66; margin-bottom: 20px; }
    select, input, textarea, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; margin-bottom: 10px; }
    textarea { resize: vertical; }
    button { background: #0d3b66; color: #fff; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; margin-top: 10px; }
    button:hover { background: #094a8a; }
    #toast { visibility: hidden; min-width: 250px; background-color: #0d3b66; color: #fff; text-align: center; border-radius: 8px; padding: 10px; position: fixed; z-index: 10002; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; opacity: 0; transition: opacity 0.5s, bottom 0.5s; }
    #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    .hidden { display: none !important; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; font-size: 13px; text-align: left; }
    th { background: #0d3b66; color: white; }
    .small { font-size: 12px; color: #444; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .arus-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .preview { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
    
    /* Tombol Upload */
    .btn-foto { padding: 12px; border-radius: 8px; border: none; color: #fff; font-weight: bold; cursor: pointer; flex: 1; margin: 0; font-size: 14px; }
    .btn-kamera { background: #28a745; }
    .btn-kamera:hover { background: #218838; }
    .btn-galeri { background: #17a2b8; }
    .btn-galeri:hover { background: #138496; }
    
    #flowBtn { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e6e6e6 40%, #cfcfcf 100%); color: #0d3b66; border: 1px solid rgba(255,255,255,0.6); font-size: 22px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.4); transition: all 0.3s ease; z-index: 9999; }
    #flowModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10000; }
    #flowModal.show { display:flex; }
    .flowContent { background: #fff; border-radius: 16px; padding: 20px; max-width: 90%; max-height: 85%; overflow-y: auto; position: relative; text-align: center; }
    #closeFlow { position: absolute; top: 8px; right: 16px; font-size: 28px; font-weight: bold; cursor: pointer; }
    
    #timestampModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .ts-content { background: #fff; padding: 20px; border-radius: 12px; max-width: 90%; width: 380px; text-align: center; }
    .btn-ts { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .btn-ts-today { background: #0d3b66; color: #fff; }
    .btn-ts-shift { background: #28a745; color: #fff; }
    .shift-box { background: #f4f8fb; border: 1px solid #c2d1d9; border-radius: 8px; padding: 12px; }

    #webcamModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10005; }
    #videoStream { width: 100%; max-width: 600px; border-radius: 12px; background: #000; }
  </style>
</head>
<body>

  <div class="container" id="loginSection">
    <h1>Login Petugas</h1>
    <label>Nama Petugas:</label>
    <input type="text" id="loginNama" placeholder="Contoh: Rosnabila" required />
    <label>Satuan Kerja:</label>
    <select id="loginSatuan" required>
      <option value="">-- Pilih Satuan Kerja --</option>
      <option>Stasiun Pucanggading</option>
      <option>Tx Baribis</option>
      <option>Tx Garung</option>
      <option>Tx Gantungan</option>
      <option>Tx Gn Depok</option>
      <option>Tx Gn Tugel</option>
      <option>Tx Gombel</option>
      <option>Tx Pager Gedog</option>
      <option>Tx Pucang Pendawa</option>
      <option>Tx Semanggi</option>
    </select>
    <button id="loginBtn">Masuk ke Sistem V2</button>
    <p id="loginStatus" style="text-align:center; color:#666; font-size:14px;">🔹 Masukkan identitas untuk memulai metering.</p>
  </div>

  <div class="container hidden" id="formSection">
    <h1>📋 Form Metering V2</h1>
    
    <div style="background: #eef2f5; padding: 10px; border-radius: 8px; border: 1px solid #c2d1d9; margin-bottom: 15px;">
        <p id="lokasiStatus2" class="small" style="margin: 0; font-weight: bold;">📍 Sedang mencari lokasi GPS...</p>
        <div id="cacheFallback" style="display: none; margin-top: 10px;">
          <button type="button" id="btnPakaiCache" style="padding: 6px; font-size: 11px; background: #28a745; color: #fff; border:none; border-radius:4px; cursor:pointer;">✅ Pakai lokasi tersimpan</button>
        </div>
        <button type="button" id="btnRetryLokasi" style="width: auto; padding: 8px; font-size: 12px; background: #ffc107; display: none; border:none; cursor:pointer;">🔄 Coba Lagi</button>
    </div>

    <form id="formPage">
      <div class="form-row">
        <div><label>Nama Petugas:</label><input type="text" id="petugas" readonly /></div>
        <div><label>Satuan Kerja:</label><input type="text" id="satuan_kerja" readonly /></div>
      </div>

      <div class="form-row">
        <div><label>Tanggal Pelaporan:</label><input type="date" id="tanggal" required /></div>
        <div>
          <label>Shift:</label>
          <select id="shift" required>
            <option value="">-- Pilih Shift --</option>
            <option>Shift 1</option>
            <option>Shift 2</option>
            <option>Shift 3</option>
          </select>
        </div>
      </div>

      <label>Dokumentasi Foto:</label>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <button type="button" id="btnKamera" class="btn-foto btn-kamera">📸 Kamera</button>
        <button type="button" id="btnGaleri" class="btn-foto btn-galeri">🖼️ Galeri</button>
      </div>
      <input type="file" id="foto" accept="image/*" style="display: none;" />
      <div id="fotoStatus" class="small" style="margin-bottom:15px;">— belum ada foto</div>

      <label>Pilih Panel (Input satu per satu):</label>
      <select id="mccb">
        <option value="">-- Pilih MCCB/PDB --</option>
      </select>

      <label>Arus Listrik (Ampere):</label>
      <div class="arus-row">
        <div><label>Arus R:</label><input type="number" id="arus_r" step="0.01" /></div>
        <div><label>Arus S:</label><input type="number" id="arus_s" step="0.01" /></div>
        <div><label>Arus T:</label><input type="number" id="arus_t" step="0.01" /></div>
      </div>

      <label>Catatan Khusus:</label>
      <textarea id="catatan" placeholder="Contoh: MCB Suhu Normal"></textarea>

      <button type="button" id="saveBtn" style="background: #28a745;">💾 Simpan ke Tabel Sementara</button>
      <button type="button" id="submitBtn" style="background:#0056b3; font-size: 16px; padding: 15px;">📤 KIRIM SEMUA DATA (1 BARIS)</button>
    </form>

    <div id="status" style="text-align: center; font-weight: bold; margin-top: 10px;"></div>

    <div class="preview">
      <h3 id="previewTitle">📋 Review Data (Belum Terkirim)</h3>
      <img id="fotoPreview" class="hidden" style="max-width:100%; border-radius:8px; margin-bottom: 10px;">
      <button type="button" id="downloadBtn" class="hidden" style="background:#ffc107; color:#000;">⬇️ Simpan Foto Geotag ke HP</button>
      <div id="output"></div>
    </div>
  </div>

  <div id="toast"></div>
  <button id="flowBtn">❓</button>

  <div id="flowModal" class="hidden">
    <div class="flowContent">
      <span id="closeFlow">&times;</span>
      <h2>🧭 Panduan Metering</h2>
      <img id="flowImg" style="max-width:100%;" />
    </div>
  </div>

  <div id="timestampModal">
    <div class="ts-content">
      <h3>Opsi Watermark Geotag</h3>
      <p id="modalDesc" style="font-size: 13px; color: #444;"></p>
      <button id="btnSkipWm" class="btn-ts" style="background: #6c757d; color: #fff; display: none;">Tanpa Watermark</button>
      <div id="matchOptions" style="display: none;">
        <button id="btnTambahkanWm" class="btn-ts btn-ts-today">📍 Tambah Geotag Sekarang</button>
      </div>
      <div id="mismatchOptions" style="display: none;">
        <button id="btnTsToday" class="btn-ts btn-ts-today">📍 Pakai Waktu HP Sekarang</button>
        <div class="shift-box">
          <button id="btnTsShift" class="btn-ts btn-ts-shift">📍 Sesuaikan Waktu Shift</button>
        </div>
      </div>
    </div>
  </div>

  <div id="webcamModal">
    <video id="videoStream" autoplay playsinline></video>
    <canvas id="cameraCanvas" style="display:none;"></canvas>
    <div style="margin-top:20px;">
      <button id="btnSnap" class="btn-foto btn-kamera" style="width: 150px;">📸 JEPRET</button>
      <button id="btnCloseCamera" class="btn-foto" style="background:#dc3545; width: 100px;">BATAL</button>
    </div>
  </div>

<script>
/* --- CONFIGURATION --- */
const scriptURL = "https://script.google.com/macros/s/AKfycbzFR8pSG259Md11je_R92YTxl_zmIoHZHIHt_H1qf66bEdiqdgKagmsbY0GNbHvdxaSbA/exec"; 
const fotoUploadURL = "https://script.google.com/macros/s/AKfycbxOsZ8NO-TSe9QI3xBnt81hOuv7r3H1VKs8QYvr9UsUOoM6NmTEFGY2VI5Zesj_kZSvZQ/exec"; 

/* --- APP STATE --- */
let savedReports = {};
let lokasiTeks = { lat: "-", lng: "-", alamat: "Mencari lokasi..." };
let fotoDriveURL = ""; 
let loginTimestamp = "";
let currentCompressedDataURL = "";

const ORDER_PDB = ["MDB Utama/PLN", "PDB Pemancar", "PDB Sarpras"];
const ORDER_MCCB = ["MCCB GPO/Administrasi","MCCB Peralatan G. Ops.","MCCB Pen. Lantai 2 G. Ops.","MCCB AC Lantai 2 G. Ops.","MCCB AC Studio Utama","MCCB AC R. Berita / Siaran Lantai 2, G.Ops.","MCCB Studio 2 dan AC Teknik","MCCB Lap. Tenis/AC R. Redaksi G. Ops.","MCCB AC Lantai 1 G. Ops.","MCCB Dimer/Lighting Sto. 1","MCCB Outdoor/L. Taman"];

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

/* --- UI HELPERS --- */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

/* --- GEOLOCATION LOGIC --- */
function getLocation() {
  const lokEl = document.getElementById('lokasiStatus2');
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      lokasiTeks.lat = pos.coords.latitude.toFixed(6);
      lokasiTeks.lng = pos.coords.longitude.toFixed(6);
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lokasiTeks.lat}&lon=${lokasiTeks.lng}&format=json`);
        const data = await res.json();
        lokasiTeks.alamat = data.display_name;
        lokEl.textContent = `📍 ${lokasiTeks.alamat}`;
      } catch { lokEl.textContent = `📍 GPS: ${lokasiTeks.lat}, ${lokasiTeks.lng}`; }
    }, () => { lokEl.textContent = "⚠️ Gagal GPS. Cek izin lokasi browser."; }, { enableHighAccuracy: true });
  }
}
getLocation();

/* --- FORM & LOGIN FLOW --- */
document.getElementById('loginBtn').addEventListener('click', () => {
  const n = document.getElementById('loginNama').value.trim();
  const s = document.getElementById('loginSatuan').value;
  if(!n || !s) return alert("Isi nama dan satuan kerja!");
  
  document.getElementById('petugas').value = n;
  document.getElementById('satuan_kerja').value = s;
  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('formSection').classList.remove('hidden');
  
  // Populate MCB options
  const list = (s === "Stasiun Pucanggading") ? ORDER_MCCB : ORDER_PDB;
  document.getElementById('mccb').innerHTML = '<option value="">-- Pilih Panel --</option>' + list.map(x => `<option>${x}</option>`).join('');
});

/* --- FOTO & WATERMARK LOGIC --- */
document.getElementById('btnKamera').addEventListener('click', async () => {
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if (isMobile) {
    document.getElementById('foto').setAttribute('capture', 'environment');
    document.getElementById('foto').click();
  } else {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById('videoStream').srcObject = stream;
    document.getElementById('webcamModal').style.display = 'flex';
  }
});

document.getElementById('btnGaleri').addEventListener('click', () => {
  document.getElementById('foto').removeAttribute('capture');
  document.getElementById('foto').click();
});

document.getElementById('foto').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (re) => { await prosesFoto(re.target.result); };
  reader.readAsDataURL(file);
});

async function prosesFoto(dataUrl) {
  const tgl = document.getElementById('tanggal').value;
  const shf = document.getElementById('shift').value;
  if(!tgl || !shf) return alert("Pilih Tanggal & Shift dulu!");
  
  // Tampilkan modal watermark (disederhanakan untuk efisiensi)
  document.getElementById('timestampModal').style.display = 'flex';
  document.getElementById('matchOptions').style.display = 'block';
  
  document.getElementById('btnTambahkanWm').onclick = async () => {
    document.getElementById('timestampModal').style.display = 'none';
    document.getElementById('fotoStatus').textContent = "⏳ Memproses & Upload...";
    
    currentCompressedDataURL = await compressAndWatermark(dataUrl, new Date().toLocaleString());
    document.getElementById('fotoPreview').src = currentCompressedDataURL;
    document.getElementById('fotoPreview').classList.remove('hidden');
    document.getElementById('downloadBtn').classList.remove('hidden');
    
    // Upload ke Drive
    const res = await fetch(fotoUploadURL, {
      method: 'POST',
      body: new URLSearchParams({
        filedata: currentCompressedDataURL.split(",")[1],
        mimetype: "image/jpeg",
        petugas: document.getElementById('petugas').value,
        satuan_kerja: document.getElementById('satuan_kerja').value
      })
    });
    const result = await res.json();
    fotoDriveURL = result.url;
    document.getElementById('fotoStatus').textContent = "✅ Foto Terunggah!";
    showToast("📸 Foto Berhasil di Drive");
  };
}

function compressAndWatermark(dataURL, ts) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      canvas.width = 1000; canvas.height = (1000/img.width)*img.height;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, canvas.height-80, canvas.width, 80);
      ctx.fillStyle = "white"; ctx.font = "20px Arial";
      ctx.fillText(`Petugas: ${document.getElementById('petugas').value} | GPS: ${lokasiTeks.lat}, ${lokasiTeks.lng}`, 20, canvas.height-45);
      ctx.fillText(`Waktu: ${ts} | ${lokasiTeks.alamat.substring(0, 70)}...`, 20, canvas.height-15);
      res(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = dataURL;
  });
}

/* --- SAVE TO TABLE LOGIC --- */
document.getElementById('saveBtn').addEventListener('click', () => {
  const jenis = document.getElementById('mccb').value;
  const r = document.getElementById('arus_r').value;
  const s = document.getElementById('arus_s').value;
  const t = document.getElementById('arus_t').value;
  const cat = document.getElementById('catatan').value;
  
  if(!jenis) return alert("Pilih Panel dulu!");
  
  savedReports[jenis] = { r, s, t, cat };
  renderOutput();
  showToast(`💾 Data ${jenis} disimpan sementara`);
});

function renderOutput() {
  const out = document.getElementById('output');
  let html = "<table><tr><th>Panel</th><th>R</th><th>S</th><th>T</th></tr>";
  for(let k in savedReports) {
    html += `<tr><td>${k}</td><td>${savedReports[k].r}</td><td>${savedReports[k].s}</td><td>${savedReports[k].t}</td></tr>`;
  }
  out.innerHTML = html + "</table>";
}

/* ---------- SUBMIT FINAL (V2 - 1 BARIS) ---------- */
document.getElementById('submitBtn').addEventListener('click', async () => {
  if (Object.keys(savedReports).length === 0) return alert("Simpan minimal 1 panel dulu!");

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = "⏳ MENGIRIM...";

  // 1. Siapkan Objek 1 Baris
  const flatData = {
    tanggal: document.getElementById('tanggal').value,
    shift: document.getElementById('shift').value,
    petugas: document.getElementById('petugas').value,
    satuan_kerja: document.getElementById('satuan_kerja').value,
    link_foto: fotoDriveURL
  };

  // 2. Mapping Arus
  let catatanGabungan = [];
  for(let jenis in savedReports) {
    const d = savedReports[jenis];
    const key = jenis.toLowerCase();
    
    if(key.includes("mdb")) { flatData.mdb_r = d.r; flatData.mdb_s = d.s; flatData.mdb_t = d.t; }
    else if(key.includes("pemancar")) { flatData.pem_r = d.r; flatData.pem_s = d.s; flatData.pem_t = d.t; }
    else if(key.includes("sarpras")) { flatData.sar_r = d.r; flatData.sar_s = d.s; flatData.sar_t = d.t; }
    
    if(d.cat) catatanGabungan.push(`${jenis}: ${d.cat}`);
  }
  flatData.catatan = catatanGabungan.join(" | ");

  try {
    await fetch(scriptURL, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify(flatData)
    });
    
    alert("✅ BERHASIL! Data V2 sudah masuk sebaris ke Spreadsheet.");
    location.reload(); // Reset form total
  } catch (e) {
    alert("❌ Gagal kirim: " + e.message);
    btn.disabled = false; btn.textContent = "📤 COBA LAGI";
  }
});

/* --- PANDUAN --- */
document.getElementById('flowBtn').onclick = () => {
  document.getElementById('flowImg').src = "https://raw.githubusercontent.com/nonarose/formmeteringaruslistrik/refs/heads/main/flowchart_form.svg";
  document.getElementById('flowModal').classList.add('show');
};
document.getElementById('closeFlow').onclick = () => document.getElementById('flowModal').classList.remove('show');

</script>
</body>
</html>
