<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form Monitoring MCCB</title>
  <link rel="icon" href="logo.png" type ="image/png"/>
  <style>
    /* --- STYLES ASLI ROSNABILA --- */
    body { font-family: 'Segoe UI', sans-serif; background-color: #0d3b66; margin: 0; padding: 0; color: #000; }
    .container { background: #fff; border-radius: 20px; padding: 20px; max-width: 850px; margin: 40px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    h1 { text-align: center; color: #0d3b66; margin-bottom: 20px; }
    select, input, textarea, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; margin-bottom: 10px; }
    textarea { resize: vertical; }
    button { background: #0d3b66; color: #fff; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; margin-top: 10px; }
    button:hover { background: #094a8a; }
    #toast { visibility: hidden; min-width: 250px; background-color: #0d3b66; color: #fff; text-align: center; border-radius: 8px; padding: 10px; position: fixed; z-index: 10002; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; opacity: 0; transition: opacity 0.5s, bottom 0.5s; }
    #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    .hidden { display: none !important; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; font-size: 13px; text-align: left; }
    th { background: #0d3b66; color: white; }
    .small { font-size: 12px; color: #444; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .arus-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .preview { margin-top: 20px; }
    
    .btn-foto { padding: 12px; border-radius: 8px; border: none; color: #fff; font-weight: bold; cursor: pointer; flex: 1; margin: 0; font-size: 14px; }
    .btn-kamera { background: #28a745; }
    .btn-kamera:hover { background: #218838; }
    .btn-galeri { background: #17a2b8; }
    .btn-galeri:hover { background: #138496; }
    
    #flowBtn { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e6e6e6 40%, #cfcfcf 100%); color: #0d3b66; border: 1px solid rgba(255,255,255,0.6); font-size: 22px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,255,0.6), inset 0 -3px 6px rgba(0,0,0,0.25); transition: all 0.3s ease; z-index: 9999; }
    #flowModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10000; }
    #flowModal.show { display:flex; }
    .flowContent { background: #fff; border-radius: 16px; padding: 20px; max-width: 90%; max-height: 85%; overflow-y: auto; position: relative; text-align: center; }
    .flowContent img { max-width: 100%; height: auto; border-radius: 8px; }
    #closeFlow { position: absolute; top: 8px; right: 16px; font-size: 28px; font-weight: bold; color: #444; cursor: pointer; }
    
    #timestampModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10001; }
    .ts-content { background: #fff; padding: 20px; border-radius: 12px; max-width: 90%; text-align: center; width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .ts-content h3 { color: #0d3b66; margin-top: 0; margin-bottom: 10px; }
    .btn-ts { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    .btn-ts-today { background: #0d3b66; color: #fff; }
    .btn-ts-shift { background: #28a745; color: #fff; }
    .shift-box { background: #f4f8fb; border: 1px solid #c2d1d9; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
    .manual-time-container { display: flex; gap: 8px; align-items: center; margin-top: 8px; border-top: 1px dashed #ccc; padding-top: 10px; }

    #webcamModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10005; }
    #videoStream { width: 100%; max-width: 600px; border-radius: 12px; background: #000; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .webcam-btn-container { display: flex; gap: 15px; }
    .btn-jepret { background: #28a745; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; }
    .btn-tutup-webcam { background: #dc3545; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="container" id="loginSection">
    <h1>Login Petugas</h1>
    <label for="loginNama">Nama Petugas:</label>
    <input type="text" id="loginNama" placeholder="Masukkan nama petugas" required />
    <label for="loginSatuan">Satuan Kerja:</label>
    <select id="loginSatuan" required>
      <option value="">-- Pilih Satuan Kerja --</option>
      <option>Stasiun Pucanggading</option>
      <option>Tx Baribis</option>
      <option>Tx Garung</option>
      <option>Tx Gantungan</option>
      <option>Tx Gn Depok</option>
      <option>Tx Gn Tugel</option>
      <option>Tx Gombel</option>
      <option>Tx Pager Gedog</option>
      <option>Tx Pucang Pendawa</option>
      <option>Tx Semanggi</option>
    </select>
    <button id="loginBtn">Masuk</button>
    <p id="loginStatus" style="text-align:center; color:#666; font-size:14px;">🔹 Masukkan identitas Anda untuk melanjutkan.</p>
  </div>

  <div class="container hidden" id="formSection">
    <h1>📋 Form Metering</h1>
    
    <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 15px; background: #eef2f5; padding: 10px; border-radius: 8px; border: 1px solid #c2d1d9;">
      <div style="flex: 1;">
        <p id="lokasiStatus2" class="small" style="margin: 0; font-weight: bold; line-height: 1.4;">📍 Sedang mencari lokasi satelit...</p>
        <div id="cacheFallback" style="display: none; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ccc;">
          <p id="cacheText" style="margin: 0; font-size: 11px; color: #555; margin-bottom: 6px;">Lokasi tersimpan: -</p>
          <button type="button" id="btnPakaiCache" style="padding: 6px 10px; font-size: 11px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">✅ Pakai lokasi ini</button>
        </div>
      </div>
      <button type="button" id="btnRetryLokasi" style="width: auto; margin: 0 0 0 10px; padding: 8px 12px; font-size: 12px; background: #ffc107; color: #000; display: none; border-radius: 6px; border:none; font-weight:bold; cursor:pointer;">🔄 Coba Lagi</button>
    </div>

    <form id="formPage">
      <label>Nama Petugas:</label>
      <input type="text" id="petugas" readonly />
      <label>Satuan Kerja:</label>
      <input type="text" id="satuan_kerja" readonly />

      <div class="form-row">
        <div><label>Tanggal:</label><input type="date" id="tanggal" required /></div>
        <div>
          <label>Shift:</label>
          <select id="shift">
            <option value="">-- Pilih Shift --</option>
            <option>Shift 1</option>
            <option>Shift 2</option>
            <option>Shift 3</option>
          </select>
        </div>
      </div>

      <label>Upload Foto : </label>
      <div style="display: flex; gap: 10px; margin-bottom: 0;">
        <button type="button" id="btnKamera" class="btn-foto btn-kamera">📸 Kamera Langsung</button>
        <button type="button" id="btnGaleri" class="btn-foto btn-galeri">🖼️ Buka Galeri</button>
      </div>
      <input type="file" id="foto" accept="image/*" style="display: none;" />
      <div id="fotoStatus" class="small" style="margin-top:6px; margin-bottom:15px; color:#444;">— belum ada foto</div>

      <label>Jenis MCCB / PDB:</label>
      <select id="mccb"><option value="">-- Pilih MCCB/PDB --</option></select>

      <label>Arus (Ampere):</label>
      <div class="arus-row">
        <div><label>Arus R:</label><input type="number" id="arus_r" step="0.01" /></div>
        <div><label>Arus S:</label><input type="number" id="arus_s" step="0.01" /></div>
        <div><label>Arus T:</label><input type="number" id="arus_t" step="0.01" /></div>
      </div>

      <label>Catatan:</label>
      <textarea id="catatan" placeholder="Tambahkan catatan..."></textarea>

      <button type="button" id="saveBtn">💾 Simpan Data</button>
      <button type="button" id="submitBtn" style="background:#0056b3;">📤 Kirim ke Spreadsheet Data Metering</button>
    </form>

    <div id="status"></div>
    <div class="preview">
      <h3 id="previewTitle">📋 Data Tersimpan (Belum Dikirim)</h3>
      <img id="fotoPreview" class="hidden" alt="Preview foto" style="max-width:100%; margin-bottom:8px; border-radius:8px;">
      <button type="button" id="downloadBtn" class="hidden" style="background:#ffc107; color:#000; margin-bottom:15px;">⬇️ Unduh Gambar Ber-Watermark</button>
      <div id="output"></div>
    </div>
  </div>

  <div id="toast"></div>
  <button id="flowBtn" title="Lihat Panduan">❓</button>

  <div id="flowModal" class="hidden">
    <div class="flowContent"><span id="closeFlow">&times;</span><h2>🧭 Panduan Pengisian</h2><img id="flowImg" src="" /></div>
  </div>

  <div id="timestampModal">
    <div class="ts-content">
      <h3>Opsi Watermark Foto</h3>
      <p id="modalDesc"></p>
      <button id="btnSkipWm" class="btn-ts" style="background: #6c757d; color: #fff; display: none;">📁 Foto Sudah Bergeotag</button>
      <div id="matchOptions" style="display: none;"><button id="btnTambahkanWm" class="btn-ts btn-ts-today">📍 Tambah Watermark Geotag</button></div>
      <div id="mismatchOptions" style="display: none;">
        <button id="btnTsToday" class="btn-ts btn-ts-today">📍 Gunakan Waktu Saat Ini</button>
        <div class="shift-box">
          <button id="btnTsShift" class="btn-ts btn-ts-shift">📍 Sesuai Input Shift</button>
          <div class="manual-time-container">
            <input type="time" id="manualTime" style="flex:1" /><button id="btnTsManual">Pilih Jam</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="webcamModal">
    <video id="videoStream" autoplay playsinline></video>
    <div class="webcam-btn-container"><button id="btnSnap" class="btn-jepret">📸 Jepret</button><button id="btnCloseCamera" class="btn-tutup-webcam">Batal</button></div>
    <canvas id="cameraCanvas" style="display:none;"></canvas>
  </div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzFR8pSG259Md11je_R92YTxl_zmIoHZHIHt_H1qf66bEdiqdgKagmsbY0GNbHvdxaSbA/exec"; 
const fotoUploadURL = "https://script.google.com/macros/s/AKfycbxOsZ8NO-TSe9QI3xBnt81hOuv7r3H1VKs8QYvr9UsUOoM6NmTEFGY2VI5Zesj_kZSvZQ/exec"; 

/* DOM refs & State ASLI */
const lokasiEl = document.getElementById('lokasiStatus2');
const btnRetryLokasi = document.getElementById('btnRetryLokasi');
const cacheFallback = document.getElementById('cacheFallback');
const output = document.getElementById('output');
const status = document.getElementById('status');
const foto = document.getElementById('foto');
const webcamModal = document.getElementById('webcamModal');
const videoStream = document.getElementById('videoStream');
const cameraCanvas = document.getElementById('cameraCanvas');
const fotoStatus = document.getElementById('fotoStatus');
const fotoPreview = document.getElementById('fotoPreview');
const downloadBtn = document.getElementById('downloadBtn');
const el = { mccb: document.getElementById('mccb') };

let savedReports = {};
let lokasiTeks = {};
let tempInputs = {};
let fotoDriveURL = ""; 
let loginTimestamp ="";
let currentCompressedDataURL = "";
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

const ORDER_PDB = ["MDB Utama/PLN", "PDB Pemancar", "PDB Sarpras"];
const ORDER_MCCB = ["MCCB GPO/Administrasi","MCCB Peralatan G. Ops.","MCCB Pen. Lantai 2 G. Ops.","MCCB AC Lantai 2 G. Ops.","MCCB AC Studio Utama","MCCB AC R. Berita / Siaran Lantai 2, G.Ops.","MCCB Studio 2 dan AC Teknik","MCCB Lap. Tenis/AC R. Redaksi G. Ops.","MCCB AC Lantai 1 G. Ops.","MCCB Dimer/Lighting Sto. 1","MCCB Outdoor/L. Taman"];

/* --- FUNGSI UI & LOGIC ASLI (REVERSE GEO, WATERMARK, DLL) --- */
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg; toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

function getLocation() {
  lokasiEl.textContent = "📍 Sedang mencari lokasi satelit...";
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude.toFixed(6), lng = pos.coords.longitude.toFixed(6);
      lokasiTeks = { lat, lng };
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
        const d = await res.json(); lokasiTeks.alamat = d.display_name;
        lokasiEl.textContent = `📍 ${d.display_name} (${lat}, ${lng})`;
      } catch { lokasiEl.textContent = `📍 (${lat}, ${lng})`; }
    }, () => { btnRetryLokasi.style.display = 'inline-block'; lokasiEl.textContent = "⚠️ Gagal GPS."; }, { enableHighAccuracy: true });
  }
}
getLocation();

function isiMCCB(unit){
  const data = unit === "Stasiun Pucanggading" ? ORDER_MCCB : ORDER_PDB;
  el.mccb.innerHTML ='<option value="">-- Pilih MCCB/PDB --</option>' + data.map(x => `<option value="${x}">${x}</option>`).join('');
}

document.getElementById('loginBtn').addEventListener('click', () => {
  const nama = document.getElementById('loginNama').value.trim(), satuan = document.getElementById('loginSatuan').value;
  if (!nama || !satuan) return alert("Isi identitas!");
  document.getElementById('petugas').value = nama; document.getElementById('satuan_kerja').value = satuan;
  document.getElementById('loginSection').classList.add('hidden'); document.getElementById('formSection').classList.remove('hidden');
  isiMCCB(satuan);
});

/* --- LOGIKA FOTO & WATERMARK (ROUNDED RECT & ICON) TETAP SAMA --- */
async function prosesFoto(dataUrl) {
  const tgl = document.getElementById('tanggal').value, shf = document.getElementById('shift').value;
  if(!tgl || !shf) return alert("Pilih Tanggal & Shift!");
  
  // Trigger modal watermark
  const modal = document.getElementById('timestampModal');
  modal.style.display = 'flex';
  document.getElementById('matchOptions').style.display = 'block';
  
  document.getElementById('btnTambahkanWm').onclick = async () => {
    modal.style.display = 'none';
    fotoStatus.textContent = "⏳ Memproses & Upload...";
    currentCompressedDataURL = await compressAndWatermark(dataUrl, new Date().toLocaleString());
    fotoPreview.src = currentCompressedDataURL; fotoPreview.classList.remove("hidden");
    
    const res = await fetch(fotoUploadURL, {
      method: 'POST', body: new URLSearchParams({ filedata: currentCompressedDataURL.split(",")[1], mimetype: "image/jpeg", petugas: document.getElementById('petugas').value, satuan_kerja: document.getElementById('satuan_kerja').value })
    });
    const result = await res.json();
    fotoDriveURL = result.url; fotoStatus.textContent = "✅ Foto Tersimpan.";
  };
}

function compressAndWatermark(dataURL, ts) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      canvas.width = 1200; canvas.height = (1200/img.width)*img.height;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      // Gambar gaya estetik asli kamu
      ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
      ctx.fillRect(20, canvas.height - 120, canvas.width - 40, 100);
      ctx.fillStyle = "white"; ctx.font = "bold 24px Segoe UI";
      ctx.fillText(`${document.getElementById('petugas').value} — ${document.getElementById('satuan_kerja').value}`, 40, canvas.height - 85);
      ctx.font = "18px Segoe UI";
      ctx.fillText(`📍 ${lokasiTeks.alamat || 'Alamat tidak ditemukan'}`, 40, canvas.height - 55);
      ctx.fillText(`📅 ${ts} | GPS: ${lokasiTeks.lat}, ${lokasiTeks.lng}`, 40, canvas.height - 30);
      res(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = dataURL;
  });
}

document.getElementById('btnKamera').onclick = () => { document.getElementById('foto').click(); };
document.getElementById('foto').onchange = (e) => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader(); r.onload = (re) => prosesFoto(re.target.result); r.readAsDataURL(f);
};

/* ---------- SAVE LOGIC ---------- */
document.getElementById('saveBtn').onclick = () => {
  const jenis = el.mccb.value, r = document.getElementById('arus_r').value, s = document.getElementById('arus_s').value, t = document.getElementById('arus_t').value, cat = document.getElementById('catatan').value;
  if(!jenis) return alert("Pilih Panel!");
  savedReports[jenis] = { jenis, arus_r: r, arus_s: s, arus_t: t, catatan: cat };
  renderOutput(); showToast("💾 Disimpan.");
};

function renderOutput() {
  let h = "<table><tr><th>Panel</th><th>R</th><th>S</th><th>T</th></tr>";
  for(let k in savedReports) h += `<tr><td>${k}</td><td>${savedReports[k].arus_r}</td><td>${savedReports[k].arus_s}</td><td>${savedReports[k].arus_t}</td></tr>`;
  output.innerHTML = h + "</table>";
}

/* ---------- OTORITASI V2: SUBMIT FINAL 1 BARIS (INI PERBAIKANNYA) ---------- */
document.getElementById('submitBtn').onclick = async () => {
  if (Object.keys(savedReports).length === 0) return alert("Simpan minimal 1 data!");
  const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.textContent = "⏳ Mengirim V2...";

  const flatData = {
    tanggal: document.getElementById('tanggal').value,
    shift: document.getElementById('shift').value,
    petugas: document.getElementById('petugas').value,
    satuan_kerja: document.getElementById('satuan_kerja').value,
    link_foto: fotoDriveURL
  };

  let catArray = [];
  for(let k in savedReports) {
    const d = savedReports[k], key = k.toLowerCase();
    if(key.includes("mdb")) { flatData.mdb_r = d.arus_r; flatData.mdb_s = d.arus_s; flatData.mdb_t = d.arus_t; }
    else if(key.includes("pemancar")) { flatData.pem_r = d.arus_r; flatData.pem_s = d.arus_s; flatData.pem_t = d.arus_t; }
    else if(key.includes("sarpras")) { flatData.sar_r = d.arus_r; flatData.sar_s = d.arus_s; flatData.sar_t = d.arus_t; }
    if(d.catatan) catArray.push(`${k}: ${d.catatan}`);
  }
  flatData.catatan = catArray.join(" | ");

  try {
    await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(flatData) });
    alert("✅ SUKSES! Data mendarat 1 baris di V2.");
    location.reload();
  } catch (e) { alert("❌ Gagal!"); btn.disabled = false; }
};

document.getElementById("flowBtn").onclick = () => { document.getElementById("flowModal").classList.add("show"); };
document.getElementById("closeFlow").onclick = () => { document.getElementById("flowModal").classList.remove("show"); };
</script>
</body>
</html>
